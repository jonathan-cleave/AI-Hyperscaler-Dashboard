{% extends "base.html" %}

{% block content %}
<section class="story-grid">
  <article class="chart-card span-7">
    <div class="section-heading tight">
      <p class="eyebrow">Quadrant positioning map</p>
      <h2>{{ payload.quadrant_chart.title }}</h2>
    </div>
    <div class="chart-frame tall"><canvas id="{{ payload.quadrant_chart.id }}"></canvas></div>
  </article>
  <article class="insight-stack span-5">
    {% for item in payload.conclusions %}
      <div class="conclusion-card">
        <span class="thin-divider"></span>
        <h3>{{ item.question }}</h3>
        <p>{{ item.answer }}</p>
      </div>
    {% endfor %}
  </article>
</section>

{% endblock %}
